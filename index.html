<!DOCTYPE html>
<html>
<head>
  <title>MyLearnLab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #e3f2fd, #ffffff);
      margin: 0;
      text-align: center;
    }

    header {
      background: #2f80ed;
      color: white;
      padding: 25px;
      font-size: 30px;
    }

    header p {
      font-size: 14px;
    }

    .container {
      padding: 30px;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 20px;
      background: #2f80ed;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1c60c7;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 70%;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      text-align: left;
    }

    input {
      padding: 10px;
      width: 70%;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    #chatbox {
      height: 150px;
      overflow-y: auto;
      background: #f9f9f9;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .user {
      color: #2f80ed;
    }

    .bot {
      color: #333;
    }
  </style>
</head>

<body>

<header>
  MyLearnLab
  <p>Learning made simple for every child</p>
</header>

<div class="container">

  <h2>Select Mode</h2>
  <button onclick="showStudent()">Student Mode</button>
  <button onclick="showParent()">Parent Mode</button>

  <!-- STUDENT -->
  <div id="student" style="display:none;">
    <div class="card">
      <h2>Today's Focus</h2>
      <p>• Read 5 words</p>
      <p>• Listen and repeat</p>
      <p>• Match words</p>
    </div>

    <div class="card">
      <h2>AI Assistant</h2>

      <div id="chatbox"></div>

      <input type="text" id="question" placeholder="Ask something...">
      <button onclick="send()">Send</button>
    </div>
  </div>

  <!-- PARENT -->
  <div id="parent" style="display:none;">
    <div class="card">
      <h2>Parent Guide</h2>
      <p>• Help your child read daily</p>
      <p>• Use short activities</p>
    </div>
  </div>

</div>

<script>
function showStudent() {
  document.getElementById("student").style.display = "block";
  document.getElementById("parent").style.display = "none";
}

function showParent() {
  document.getElementById("parent").style.display = "block";
  document.getElementById("student").style.display = "none";
}

function send() {
  let input = document.getElementById("question");
  let chat = document.getElementById("chatbox");
  let userText = input.value;

  if (userText === "") return;

  chat.innerHTML += "<p class='user'><b>You:</b> " + userText + "</p>";

  let reply = generateResponse(userText.toLowerCase());

  setTimeout(() => {
    chat.innerHTML += "<p class='bot'><b>AI:</b> " + reply + "</p>";
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = "";
}

function generateResponse(q) {
  if (q.includes("read")) {
    return "Try reading slowly and breaking words into smaller parts.";
  } else if (q.includes("spell")) {
    return "Say the word aloud and write it step by step.";
  } else if (q.includes("difficult")) {
    return "That's okay. Learning takes time. Try one small step.";
  } else if (q.includes("hello") || q.includes("hi")) {
    return "Hi! I'm here to help you 😊";
  } else {
    return "I'm here to help! Try asking about reading or words.";
  }
}
</script>

</body>
</html>
